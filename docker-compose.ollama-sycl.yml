services:
  ollama-sycl:
    build:
      context: ollama-sycl
      dockerfile: Dockerfile
    image: ollama-sycl:local
    container_name: ollama-sycl
    restart: unless-stopped
    devices:
      - /dev/dri:/dev/dri
    volumes:
      - ollama-volume:/root/.ollama
      - sycl-cache-volume:/root/.cache
    ports:
      - 11434:11434
    environment:
      - no_proxy=localhost,127.0.0.1,ollama-sycl
      - NO_PROXY=localhost,127.0.0.1,ollama-sycl
      - ONEAPI_DEVICE_SELECTOR=level_zero:0
      - ZES_ENABLE_SYSMAN=1
      - SYCL_CACHE_PERSISTENT=1
      - SYCL_PI_LEVEL_ZERO_USE_IMMEDIATE_COMMANDLISTS=1
      - UR_L0_USE_IMMEDIATE_COMMANDLISTS=1

      # Pass-through from .env — values match recommendation
      - OLLAMA_KEEP_ALIVE
      - OLLAMA_CONTEXT_LENGTH
      - OLLAMA_IGPU_ENABLE
      - OLLAMA_NUM_PARALLEL
      - OLLAMA_MAX_LOADED_MODELS
      - OLLAMA_MAX_QUEUE
      - OLLAMA_DEBUG
      - OLLAMA_FLASH_ATTENTION
      - OLLAMA_KV_CACHE_TYPE
      - OLLAMA_GPU_OVERHEAD
      - OLLAMA_NUM_GPU
      - GGML_SYCL_DEBUG
      - GGML_SYCL_F16

  open-webui:
    image: ghcr.io/open-webui/open-webui:latest
    container_name: open-webui
    volumes:
      - open-webui-volume:/app/backend/data
    depends_on:
      - ollama-sycl
    ports:
      - 4040:8080
    environment:
      - WEBUI_AUTH=False
      - ENABLE_OPENAI_API=False
      - ENABLE_OLLAMA_API=True
      - OLLAMA_BASE_URL=http://ollama-sycl:11434
      - ENABLE_IMAGE_GENERATION=True
      - IMAGE_GENERATION_ENGINE=automatic1111
      - IMAGE_GENERATION_MODEL=dreamshaper_8
      - IMAGE_SIZE=400x400
      - IMAGE_STEPS=8
      - AUTOMATIC1111_BASE_URL=http://sdnext-ipex:7860/
      - AUTOMATIC1111_CFG_SCALE=2
      - AUTOMATIC1111_SAMPLER=DPM++ SDE
      - AUTOMATIC1111_SCHEDULER=Karras
    extra_hosts:
      - host.docker.internal:host-gateway
    restart: unless-stopped

volumes:
  ollama-volume: {}
  sycl-cache-volume: {}
  open-webui-volume: {}
