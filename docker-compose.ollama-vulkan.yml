services:
  ollama-vulkan:
    image: ollama/ollama:0.30.2
    container_name: ollama-vulkan
    restart: unless-stopped
    devices:
      - /dev/dri:/dev/dri
    volumes:
      - ollama-volume:/root/.ollama
      - vulkan-cache-volume:/root/.cache
    ports:
      - 11434:11434
    environment:
      - no_proxy=localhost,127.0.0.1
      - OLLAMA_HOST=0.0.0.0
      - ZES_ENABLE_SYSMAN=1
      - OLLAMA_VULKAN=1
      #- GGML_VK_DISABLE_F16=1           # required: Mesa ANV driver has fp16 compute bug on this iGPU
      # Pass-through from .env — values match recommendation
      - GGML_SYCL_F16
      - GGML_SYCL_DEBUG
      - OLLAMA_FLASH_ATTENTION
      - OLLAMA_KV_CACHE_TYPE
      - OLLAMA_NUM_PARALLEL
      - OLLAMA_MAX_LOADED_MODELS
      - OLLAMA_MAX_QUEUE
      - OLLAMA_DEBUG
      - OLLAMA_CONTEXT_LENGTH
      - OLLAMA_NUM_GPU
      - OLLAMA_IGPU_ENABLE
      - OLLAMA_GPU_OVERHEAD
      - OLLAMA_KEEP_ALIVE

  open-webui:
    image: ghcr.io/open-webui/open-webui:latest
    container_name: open-webui
    volumes:
      - open-webui-volume:/app/backend/data
    depends_on:
      - ollama-vulkan
    ports:
      - 4040:8080
    environment:
      - WEBUI_AUTH=False
      - ENABLE_OPENAI_API=False
      - ENABLE_OLLAMA_API=True
      - OLLAMA_BASE_URL=http://ollama-vulkan:11434
      - ENABLE_IMAGE_GENERATION=True
      - IMAGE_GENERATION_ENGINE=automatic1111
      - IMAGE_GENERATION_MODEL=dreamshaper_8
      - IMAGE_SIZE=400x400
      - IMAGE_STEPS=8
      - AUTOMATIC1111_BASE_URL=http://sdnext-ipex:7860/
      - AUTOMATIC1111_CFG_SCALE=2
      - AUTOMATIC1111_SAMPLER=DPM++ SDE
      - AUTOMATIC1111_SCHEDULER=Karras
    extra_hosts:
      - host.docker.internal:host-gateway
    restart: unless-stopped

volumes:
  ollama-volume: {}
  vulkan-cache-volume: {}
  open-webui-volume: {}
